name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download GTFS feed
        run: |
          mkdir -p build/gtfs-nl
          GTFS_URL="${{ secrets.GTFS_URL }}"
          if [ -z "$GTFS_URL" ]; then
            GTFS_URL=$(node -e "const c=require('./config.json'); console.log(c.gtfsUrl);")
          fi
          echo "Downloading GTFS feed from $GTFS_URL ..."
          curl -L "$GTFS_URL" -o build/gtfs.zip
          unzip -o build/gtfs.zip -d build/gtfs-nl
          ls -lh build/gtfs-nl/

      - name: Build data files
        run: node scripts/build-data.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
